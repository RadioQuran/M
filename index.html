<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <meta name="description" content="استمع إلى تلاوات القرآن الكريم، الأذكار، الأدعية والحديث الشريف 24/7"/>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green-deep: #0d3326;
      --green-mid: #1a5c40;
      --green-light: #2e8b57;
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --cream: #fdf6e3;
      --text-light: #f5efe0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--green-deep);
      color: var(--text-light);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(46,139,87,0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.12) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23c9a84c' stroke-width='0.3' opacity='0.15'%3E%3Cpolygon points='30,2 58,16 58,44 30,58 2,44 2,16'/%3E%3Cpolygon points='30,10 50,20 50,40 30,50 10,40 10,20'/%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── Language Switcher ── */
    .lang-wrapper {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 100;
    }

    .lang-toggle {
      background: rgba(13,51,38,0.6);
      border: 1px solid rgba(201,168,76,0.2);
      color: rgba(245,239,224,0.35);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      backdrop-filter: blur(4px);
    }

    .lang-toggle:hover {
      color: var(--gold-light);
      border-color: rgba(201,168,76,0.5);
      background: rgba(13,51,38,0.85);
    }

    .lang-switcher {
      position: absolute;
      top: 44px;
      left: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      width: 272px;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
      padding: 10px 10px 12px;
      background: rgba(13,51,38,0.25);
      border: 1px solid rgba(201,168,76,0.1);
      border-radius: 12px;
      backdrop-filter: blur(2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      scrollbar-width: thin;
      scrollbar-color: rgba(201,168,76,0.3) transparent;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px);
      transition: opacity 0.25s, transform 0.25s;
    }

    .lang-switcher::-webkit-scrollbar { width: 4px; }
    .lang-switcher::-webkit-scrollbar-track { background: transparent; }
    .lang-switcher::-webkit-scrollbar-thumb {
      background: rgba(201,168,76,0.3);
      border-radius: 2px;
    }
    .lang-switcher::-webkit-scrollbar-thumb:hover {
      background: rgba(201,168,76,0.6);
    }

    .lang-wrapper.open .lang-switcher {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    /* Grid rows inside switcher */
    .lang-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      margin-bottom: 5px;
    }
    .lang-row.top10 {
      /* top 10 rows use same grid */
    }

    /* Divider label between sections */
    .lang-region {
      grid-column: 1 / -1;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.55);
      padding: 8px 4px 4px;
      border-top: 1px solid rgba(201,168,76,0.12);
      margin-top: 4px;
      width: 100%;
    }
    .lang-region:first-child {
      border-top: none;
      padding-top: 2px;
      margin-top: 0;
    }

    /* Thin divider after top-10 */
    .lang-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.35), transparent);
      margin: 6px 0 4px;
    }

    .lang-btn {
      background: rgba(13,51,38,0.3);
      border: 1px solid rgba(201,168,76,0.15);
      color: rgba(245,239,224,0.7);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
      transition: all 0.2s;
      backdrop-filter: blur(2px);
    }

    .lang-btn:hover,
    .lang-btn.active {
      background: rgba(201,168,76,0.15);
      border-color: rgba(201,168,76,0.6);
      color: var(--gold-light);
    }

    /* Top-10 buttons slightly highlighted */
    .lang-btn.top {
      border-color: rgba(201,168,76,0.28);
      color: rgba(245,239,224,0.85);
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    header {
      text-align: center;
      animation: fadeDown 1s ease both;
    }

    .bismillah {
      font-family: 'Amiri', serif;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      color: var(--gold-light);
      letter-spacing: 0.05em;
      margin-bottom: 20px;
      opacity: 0.85;
    }

    .icon-mosque {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 12px;
      filter: drop-shadow(0 0 20px rgba(201,168,76,0.5));
      animation: pulse 3s ease-in-out infinite;
    }

    h1 {
      font-family: 'Amiri', serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      color: var(--gold);
      line-height: 1.3;
      text-shadow: 0 2px 20px rgba(201,168,76,0.3);
    }

    h1 span {
      display: block;
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(0.9rem, 2.5vw, 1.15rem);
      color: var(--text-light);
      font-weight: 300;
      letter-spacing: 0.2em;
      margin-top: 8px;
      opacity: 0.75;
    }

    .divider {
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 16px auto 0;
    }

    .ayah-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 16px;
      padding: 28px 36px;
      text-align: center;
      backdrop-filter: blur(6px);
      animation: fadeUp 1s ease 0.3s both;
      max-width: 700px;
    }

    .ayah-text {
      font-family: 'Amiri', serif;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      color: var(--gold-light);
      line-height: 2;
      margin-bottom: 12px;
    }

    .ayah-ref {
      font-size: 0.82rem;
      color: rgba(245,239,224,0.5);
      letter-spacing: 0.05em;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      width: 100%;
      animation: fadeUp 1s ease 0.5s both;
    }

    .feature {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 12px;
      padding: 20px 16px;
      text-align: center;
      transition: transform 0.25s, border-color 0.25s, background 0.25s;
    }

    .feature:hover {
      transform: translateY(-4px);
      border-color: rgba(201,168,76,0.5);
      background: rgba(201,168,76,0.07);
    }

    .feature-icon { font-size: 2rem; display: block; margin-bottom: 10px; }

    .feature-title {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--gold-light);
      margin-bottom: 6px;
    }

    .feature-desc {
      font-size: 0.8rem;
      color: rgba(245,239,224,0.55);
      line-height: 1.6;
    }

    .cta-wrap {
      animation: fadeUp 1s ease 0.7s both;
      text-align: center;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, var(--green-mid), var(--green-light));
      color: #fff;
      text-decoration: none;
      padding: 18px 48px;
      border-radius: 50px;
      font-size: 1.15rem;
      font-weight: 700;
      font-family: 'Tajawal', sans-serif;
      border: 2px solid rgba(201,168,76,0.4);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      cursor: pointer;
    }

    .cta-btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 24px rgba(201,168,76,0.3);
      border-color: rgba(201,168,76,0.8);
    }

    .cta-btn:active { transform: scale(0.98); }

    .cta-sub {
      margin-top: 14px;
      font-size: 0.8rem;
      color: rgba(245,239,224,0.4);
    }

    footer {
      text-align: center;
      font-size: 0.78rem;
      color: rgba(245,239,224,0.3);
      padding-bottom: 10px;
      animation: fadeUp 1s ease 0.9s both;

    footer a {
      color: var(--gold);
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    footer a:hover { opacity: 1; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.08); }
    }

    /* LTR override for non-Arabic languages */
    body.ltr {
      font-family: 'Tajawal', sans-serif;
      direction: ltr;
    }
    body.ltr .lang-wrapper {
      left: auto;
      right: 16px;
      top: 16px;
    }
    body.ltr .lang-switcher {
      left: auto;
      right: 0;
    }
    /* stats always opposite to lang button */
    #statsWrapper {
      position: fixed;
      bottom: 16px;
      left: 16px !important;
      right: auto !important;
    }
    body.ltr #statsWrapper {
      left: auto !important;
      right: 16px !important;
    }
  </style>
</head>

          { icon: "🌍", title: "רב-לשוני",             desc: "ערבית • אנגלית • ספרדית • עברית • ..." },
        ]
      }

        };

    // ─────────────────────────────────────────────
    //  DETECT BROWSER LANGUAGE
    // ─────────────────────────────────────────────
    function detectLang() {
      const nav = (navigator.language || navigator.userLanguage || 'ar').toLowerCase().split('-')[0];
      const map = { ar:'ar', en:'en', zh:'zh', hi:'hi', es:'es', fr:'fr', pt:'pt', ru:'ru', bn:'bn', ur:'ur', id:'id', de:'de', ja:'ja', ko:'ko', tr:'tr', vi:'vi', th:'th', fa:'fa', pl:'pl', ha:'ha', am:'am', sw:'sw', it:'it', ms:'ms', yo:'yo', tl:'tl', nl:'nl', uk:'uk', sv:'sv', he:'he', cs:'cs', da:'da', ku:'ku', ga:'ga', lv:'lv', be:'be', lb:'lb', tk:'tk', mi:'mi', hr:'hr', fi:'fi', bs:'bs', bg:'bg', el:'el', pa:'pa', uz:'uz', ps:'ps', sd:'sd', so:'so', kk:'kk', az:'az', tg:'tg', ug:'ug', om:'om', wo:'wo', sq:'sq' };
      return map[nav] || 'ar';
    }

    // ─────────────────────────────────────────────
    //  APPLY LANGUAGE
    // ─────────────────────────────────────────────
    function applyLang(code) {
      const t = translations[code];
      if (!t) return;

      // Direction & font
      document.documentElement.lang = code;
      document.documentElement.dir = t.dir;
      if (t.dir === 'ltr') {
        document.body.classList.add('ltr');
      } else {
        document.body.classList.remove('ltr');
      }

      // Text content
      document.getElementById('mainTitle').childNodes[0].textContent = t.title + '\n';
      document.getElementById('subTitle').textContent = t.subtitle;
      document.getElementById('ayahRef').textContent = t.ayahRef;
      document.getElementById('ctaText').textContent = t.cta;
      document.getElementById('ctaSub').textContent = t.ctaSub;
      document.title = t.title + ' | Radio Ma';

      // Features grid
      const grid = document.getElementById('featuresGrid');
      grid.innerHTML = t.features.map(f => `
        <div class="feature">
          <span class="feature-icon">${f.icon}</span>
          <p class="feature-title">${f.title}</p>
          <p class="feature-desc">${f.desc}</p>
        </div>
      `).join('');

      // Active button
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === code);
      });

      // Save preference
      localStorage.setItem('preferredLang', code);
    }

    // ─────────────────────────────────────────────
    //  BUILD LANG SWITCHER  (top-10 + regions)
    // ─────────────────────────────────────────────
    function buildSwitcher() {
      const switcher = document.getElementById('langSwitcher');

      // ── أول 10 الأكثر انتشاراً عالمياً (إجمالي المتحدثين) ──
      const top10 = ['en','zh','hi','es','fr','ar','bn','pt','ru','ur'];

      // ── المجموعات الجغرافية (بدون أسماء) ──
      const regions = [
        {
          // أوروبا
          langs: ['de','it','nl','pl','uk','sv','da','fi','cs','bg','hr','bs','el','sq','be','lv','lb','ga','he','mi']
        },
        {
          // آسيا الجنوبية والشرقية
          langs: ['pa','sd','ps','id','ms','tl','vi','th','ko','ja','tg','uz','kk','az','ug','tk']
        },
        {
          // الشرق الأوسط وآسيا الوسطى
          langs: ['fa','tr','ku']
        },
        {
          // أفريقيا
          langs: ['ha','sw','yo','so','am','om','wo']
        },
      ];

      // helper: make a button
      function makeBtn(code, isTop) {
        const t = translations[code];
        if (!t) return null;
        const btn = document.createElement('button');
        btn.className = 'lang-btn' + (isTop ? ' top' : '');
        btn.dataset.lang = code;
        btn.textContent = t.flag + ' ' + t.name;
        btn.onclick = () => applyLang(code);
        return btn;
      }

      // helper: append a row of buttons in pairs
      function appendRow(codes, isTop) {
        for (let i = 0; i < codes.length; i += 2) {
          const row = document.createElement('div');
          row.className = 'lang-row' + (isTop ? ' top10' : '');
          const b1 = makeBtn(codes[i], isTop);
          if (b1) row.appendChild(b1);
          if (codes[i+1]) {
            const b2 = makeBtn(codes[i+1], isTop);
            if (b2) row.appendChild(b2);
          }
          switcher.appendChild(row);
        }
      }

      // ── قسم أول 10 (بدون عنوان) ──
      appendRow(top10, true);

      // ── فاصل بعد أول 10 ──
      const div = document.createElement('div');
      div.className = 'lang-divider';
      switcher.appendChild(div);

      // ── المناطق (فاصل بسيط بين كل قارة) ──
      const alreadyShown = new Set(top10);
      regions.forEach(region => {
        const validLangs = region.langs.filter(c => translations[c] && !alreadyShown.has(c));
        if (validLangs.length === 0) return;
        validLangs.forEach(c => alreadyShown.add(c));

        const divider = document.createElement('div');
        divider.className = 'lang-divider';
        switcher.appendChild(divider);
        appendRow(validLangs, false);
      });
    }

    // ─────────────────────────────────────────────
    //  INIT
    // ─────────────────────────────────────────────
    buildSwitcher();
    const saved = localStorage.getItem('preferredLang');
    applyLang(saved && translations[saved] ? saved : detectLang());

    // Toggle open/close
    const wrapper = document.getElementById('langWrapper');
    document.getElementById('langToggle').addEventListener('click', (e) => {
      e.stopPropagation();
      wrapper.classList.toggle('open');
    });
    document.addEventListener('click', () => wrapper.classList.remove('open'));

    // ─────────────────────────────────────────────
    //  STATS — triple-click to reveal
    // ─────────────────────────────────────────────
    let clickCount = 0, clickTimer = null;
    const statsBtn = document.getElementById('statsToggle');
    const flagBox  = document.getElementById('flagContainer');

    statsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      clickCount++;
      clearTimeout(clickTimer);

      // highlight button slightly on each click
      statsBtn.style.color = 'rgba(240,208,128,0.6)';
      statsBtn.style.borderColor = 'rgba(201,168,76,0.4)';

      if (clickCount >= 3) {
        clickCount = 0;
        const isOpen = flagBox.style.display !== 'none';
        flagBox.style.display = isOpen ? 'none' : 'block';
        // full glow when open
        statsBtn.style.color = isOpen ? 'rgba(245,239,224,0.3)' : 'rgba(240,208,128,0.9)';
        statsBtn.style.borderColor = isOpen ? 'rgba(201,168,76,0.15)' : 'rgba(201,168,76,0.7)';
        statsBtn.style.background = isOpen ? 'rgba(13,51,38,0.55)' : 'rgba(201,168,76,0.15)';
      } else {
        // reset dim after 1.2s if not 3 clicks
        clickTimer = setTimeout(() => {
          clickCount = 0;
          if (flagBox.style.display === 'none') {
            statsBtn.style.color = 'rgba(245,239,224,0.3)';
            statsBtn.style.borderColor = 'rgba(201,168,76,0.15)';
            statsBtn.style.background = 'rgba(13,51,38,0.55)';
          }
        }, 1200);
      }
    });

    // close stats panel when clicking outside
    document.addEventListener('click', () => {
      if (flagBox.style.display !== 'none') {
        flagBox.style.display = 'none';
        statsBtn.style.color = 'rgba(245,239,224,0.3)';
        statsBtn.style.borderColor = 'rgba(201,168,76,0.15)';
        statsBtn.style.background = 'rgba(13,51,38,0.55)';
      }
    });
    document.getElementById('statsWrapper').addEventListener('click', e => e.stopPropagation());
  </script>
</body>
</html>
