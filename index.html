    /* ── Language Switcher ── */

      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      backdrop-filter: blur(4px);

    .lang-toggle:hover {
      color: var(--gold-light);
      border-color: rgba(201,168,76,0.5);
      background: rgba(13,51,38,0.85);
    }

    .lang-switcher {
      position: absolute;
      top: 44px;
      left: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      width: 272px;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
      padding: 10px 10px 12px;

      border: 1px solid rgba(201,168,76,0.1);

      scrollbar-color: rgba(201,168,76,0.3) transparent;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px);
      transition: opacity 0.25s, transform 0.25s;

    .lang-switcher::-webkit-scrollbar { width: 4px; }
    .lang-switcher::-webkit-scrollbar-track { background: transparent; }

      background: rgba(201,168,76,0.6);
    }

    .lang-wrapper.open .lang-switcher {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    .lang-row {

      grid-template-columns: 1fr 1fr;
      gap: 5px;

      width: 1px;

      align-self: stretch;

    /* ── Dhikr Ticker ── */
    .dhikr-ticker {
      width: 100%;
      overflow: hidden;
      position: relative;
      padding: 10px 0;
      animation: fadeUp 1s ease 0.85s both;

      top: 0; bottom: 0;
      width: 48px;
      z-index: 2;
      pointer-events: none;

      right: 0;
      background: linear-gradient(to left, var(--green-deep), transparent);

    .dhikr-ticker::after {
      left: 0;
      background: linear-gradient(to right, var(--green-deep), transparent);
    }
    .dhikr-track {
      display: flex;
      gap: 0;
      width: max-content;
      animation: ticker 28s linear infinite;
    }
    .dhikr-track:hover { animation-play-state: paused; }
    .dhikr-item {
      white-space: nowrap;
      font-family: 'Amiri', serif;
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      color: rgba(201,168,76,0.7);

      display: flex;
      align-items: center;

    .dhikr-dot {
      width: 4px; height: 4px;
      background: rgba(201,168,76,0.4);
      border-radius: 50%;
      flex-shrink: 0;
    }
    @keyframes ticker {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ── Clickable Feature Cards ── */
    .feature {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 12px;
      padding: 20px 16px;

    .feature:hover {

    .feature:hover .feature-arrow { opacity: 1; transform: translateX(0); }
    .feature-arrow {
      font-size: 0.65rem;
      color: rgba(201,168,76,0.5);
      margin-top: 8px;
      opacity: 0;
      transform: translateX(-4px);

    body.ltr {
      font-family: 'Tajawal', sans-serif;

    }
    body.ltr #statsWrapper {
      left: auto !important;
      right: 16px !important;
    }
  </style>

        subtitle: "إذاعة القرآن الكريم • RADIO MA",
        ayahRef: "סורת אל-אסרא — פסוק 9",
        cta: "התחל להאזין עכשיו",
        ctaSub: "שידור חי חינמי • 24 שעות / 7 ימים",
        features: [
          { icon: "🎙️", title: "קריאת קוראן",         desc: "קוראים מפורסמים משדרים מסביב לשעון" },
          { icon: "🌿", title: "אדכאר ודועא",          desc: "זיכרי בוקר וערב עם תזכורות אוטומטיות" },
          { icon: "📖", title: "הקוראן הקדוש",         desc: "מוסחף המדינה משולב באתר" },
          { icon: "📿", title: "מונה תסביח",           desc: "מונה אינטראקטיבי עם טיימר והתראה" },
          { icon: "📜", title: "חדית'",                desc: "מסורות נבואיות וביוגרפיות הסאחאבה" },
          { icon: "🌍", title: "רב-לשוני",             desc: "ערבית • אנגלית • ספרדית • עברית • ..." },
          { icon: "🕌", title: "זמני תפילה", desc: "חמש תפילות יומיות לפי מיקומך" },
          { icon: "📱", title: "אפליקציה לנייד", desc: "הורד את האפליקציה והאזן בכל מקום" },
        ]
      }

        };

    // ─────────────────────────────────────────────
    //  DETECT BROWSER LANGUAGE
    // ─────────────────────────────────────────────
    function detectLang() {
      const nav = (navigator.language || navigator.userLanguage || 'ar').toLowerCase().split('-')[0];
      const map = { ar:'ar', en:'en', zh:'zh', hi:'hi', es:'es', fr:'fr', pt:'pt', ru:'ru', bn:'bn', ur:'ur', id:'id', de:'de', ja:'ja', ko:'ko', tr:'tr', vi:'vi', th:'th', fa:'fa', pl:'pl', ha:'ha', am:'am', sw:'sw', it:'it', ms:'ms', yo:'yo', tl:'tl', nl:'nl', uk:'uk', sv:'sv', he:'he', cs:'cs', da:'da', ku:'ku', ga:'ga', lv:'lv', be:'be', lb:'lb', tk:'tk', mi:'mi', hr:'hr', fi:'fi', bs:'bs', bg:'bg', el:'el', pa:'pa', uz:'uz', ps:'ps', sd:'sd', so:'so', kk:'kk', az:'az', tg:'tg', ug:'ug', om:'om', wo:'wo', sq:'sq' };
      return map[nav] || 'ar';
    }

    // ─────────────────────────────────────────────
    //  APPLY LANGUAGE  (see full version below)
    // ─────────────────────────────────────────────
    function applyLang(code) {}

    // ─────────────────────────────────────────────
    //  BUILD LANG SWITCHER  (top-10 + regions)
    // ─────────────────────────────────────────────
    function buildSwitcher() {
      const switcher = document.getElementById('langSwitcher');

      // ── Search box ──
      const search = document.createElement('input');
      search.type = 'text';
      search.className = 'lang-search';
      search.id = 'langSearch';
      search.placeholder = '🔍 ابحث عن لغة...';
      switcher.appendChild(search);

      search.addEventListener('input', () => {
        const q = search.value.trim().toLowerCase();
        switcher.querySelectorAll('.lang-btn').forEach(btn => {
          const match = btn.textContent.toLowerCase().includes(q);
          btn.closest('.lang-row').style.display = '';
          btn.style.display = match || !q ? '' : 'none';
        });
        switcher.querySelectorAll('.lang-row').forEach(row => {
          const anyVisible = [...row.querySelectorAll('.lang-btn')].some(b => b.style.display !== 'none');
          row.style.display = anyVisible ? '' : 'none';
        });
        switcher.querySelectorAll('.lang-divider').forEach(d => {
          d.style.display = q ? 'none' : '';
        });
      });

      // ── أول 10 الأكثر انتشاراً عالمياً (إجمالي المتحدثين) ──
      const top10 = ['en','zh','hi','es','fr','ar','bn','pt','ru','ur'];

      // ── المجموعات الجغرافية (بدون أسماء) ──
      const regions = [
        {
          // أوروبا
          langs: ['de','it','nl','pl','uk','sv','da','fi','cs','bg','hr','bs','el','sq','be','lv','lb','ga','he','mi']
        },
        {
          // آسيا الجنوبية والشرقية
          langs: ['pa','sd','ps','id','ms','tl','vi','th','ko','ja','tg','uz','kk','az','ug','tk']
        },
        {
          // الشرق الأوسط وآسيا الوسطى
          langs: ['fa','tr','ku']
        },
        {
          // أفريقيا
          langs: ['ha','sw','yo','so','am','om','wo']
        },
      ];

      // helper: make a button
      function makeBtn(code, isTop) {
        const t = translations[code];
        if (!t) return null;
        const btn = document.createElement('button');
        btn.className = 'lang-btn' + (isTop ? ' top' : '');
        btn.dataset.lang = code;
        btn.textContent = t.flag + ' ' + t.name;
        btn.onclick = () => applyLang(code);
        return btn;
      }

      // helper: append a row of buttons in pairs
      function appendRow(codes, isTop) {
        for (let i = 0; i < codes.length; i += 2) {
          const row = document.createElement('div');
          row.className = 'lang-row' + (isTop ? ' top10' : '');
          const b1 = makeBtn(codes[i], isTop);
          if (b1) row.appendChild(b1);
          if (codes[i+1]) {
            const b2 = makeBtn(codes[i+1], isTop);
            if (b2) row.appendChild(b2);
          }
          switcher.appendChild(row);
        }
      }

      // ── قسم أول 10 (بدون عنوان) ──
      appendRow(top10, true);

      // ── فاصل بعد أول 10 ──
      const div = document.createElement('div');
      div.className = 'lang-divider';
      switcher.appendChild(div);

      // ── المناطق (فاصل بسيط بين كل قارة) ──
      const alreadyShown = new Set(top10);
      regions.forEach(region => {
        const validLangs = region.langs.filter(c => translations[c] && !alreadyShown.has(c));
        if (validLangs.length === 0) return;
        validLangs.forEach(c => alreadyShown.add(c));

        const divider = document.createElement('div');
        divider.className = 'lang-divider';
        switcher.appendChild(divider);
        appendRow(validLangs, false);
      });
    }

    // ─────────────────────────────────────────────
    //  STATS COUNTER ANIMATION
    // ─────────────────────────────────────────────
    const statsTargets = { langs: 56, stations: 120, reciters: 30 };
    const statsLabels = {
      ar:  { langs:'لغة',       stations:'إذاعة',      live:'بث مباشر',     reciters:'قارئ' },
      en:  { langs:'Languages', stations:'Stations',    live:'Live 24/7',     reciters:'Reciters' },
      fr:  { langs:'Langues',   stations:'Stations',    live:'En direct',     reciters:'Récitateurs' },
      es:  { langs:'Idiomas',   stations:'Emisoras',    live:'En directo',    reciters:'Recitadores' },
      tr:  { langs:'Dil',       stations:'İstasyon',    live:'Canlı 24/7',    reciters:'Kari' },
      id:  { langs:'Bahasa',    stations:'Stasiun',     live:'Siaran Langsung', reciters:'Qari' },
      ur:  { langs:'زبانیں',    stations:'اسٹیشن',     live:'لائیو',         reciters:'قاری' },
      de:  { langs:'Sprachen',  stations:'Sender',      live:'Live 24/7',     reciters:'Rezitatoren' },
      ru:  { langs:'Языков',    stations:'Станций',     live:'Прямой эфир',   reciters:'Чтецов' },
    };
    function updateStatsLabels(code) {
      const lbl = statsLabels[code] || statsLabels.en;
      const lblLangs = document.getElementById('lbl-langs');
      const lblStations = document.getElementById('lbl-stations');
      const lblLive = document.getElementById('lbl-live');
      const lblReciters = document.getElementById('lbl-reciters');
      if (lblLangs) lblLangs.textContent = lbl.langs;
      if (lblStations) lblStations.textContent = lbl.stations;
      if (lblLive) lblLive.textContent = lbl.live;
      if (lblReciters) lblReciters.textContent = lbl.reciters;
    }
    function animateCounter(id, target, duration = 1800) {
      const el = document.getElementById(id);
      if (!el) return;
      const start = performance.now();
      function step(now) {
        const p = Math.min((now - start) / duration, 1);
        const ease = 1 - Math.pow(1 - p, 3);
        el.textContent = Math.round(ease * target) + '+';
        if (p < 1) requestAnimationFrame(step);
        else el.textContent = target + '+';
      }
      requestAnimationFrame(step);
    }
    const statsObs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          animateCounter('cnt-langs',    statsTargets.langs,    1400);
          animateCounter('cnt-stations', statsTargets.stations, 1800);
          animateCounter('cnt-reciters', statsTargets.reciters, 1200);
          statsObs.disconnect();
        }
      });
    }, { threshold: 0.4 });
    const statsBar = document.getElementById('statsBar');
    if (statsBar) statsObs.observe(statsBar);

    // ─────────────────────────────────────────────
    //  DHIKR TICKER
    // ─────────────────────────────────────────────
    const dhikrList = [
      'سُبْحَانَ اللَّهِ', 'الْحَمْدُ لِلَّهِ', 'اللَّهُ أَكْبَرُ',
      'لَا إِلَهَ إِلَّا اللَّهُ', 'أَسْتَغْفِرُ اللَّهَ',
      'سُبْحَانَ اللَّهِ وَبِحَمْدِهِ', 'لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ',
      'اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ ﷺ', 'حَسْبُنَا اللَّهُ وَنِعْمَ الْوَكِيلُ',
      'سُبْحَانَ اللَّهِ الْعَظِيمِ',
    ];
    function buildTicker() {
      const track = document.getElementById('dhikrTrack');
      if (!track) return;
      const doubled = [...dhikrList, ...dhikrList];
      track.innerHTML = doubled.map(d =>
        `<span class="dhikr-item"><span class="dhikr-dot"></span>${d}</span>`
      ).join('');
    }
    buildTicker();

    // ─────────────────────────────────────────────
    //  FEATURE CARD LINKS  (map to site sections)
    // ─────────────────────────────────────────────
    const BASE = 'https://magziko.github.io/Radio/';
    const featureLinks = {
      '🎙️': BASE, '🌿': BASE, '📖': BASE,
      '📿': BASE, '📜': BASE, '🌍': BASE,
      '🕌': BASE, '📱': 'https://median.co/share/bnakxxn#androidphone',
    };

    // ─────────────────────────────────────────────
    //  APPLY LANGUAGE  (full, with linked feature cards)
    // ─────────────────────────────────────────────
    applyLang = function(code) {
      const t = translations[code];
      if (!t) return;
      document.documentElement.lang = code;
      document.documentElement.dir = t.dir;
      if (t.dir === 'ltr') document.body.classList.add('ltr');
      else document.body.classList.remove('ltr');
      document.getElementById('mainTitle').childNodes[0].textContent = t.title + '\n';
      document.getElementById('subTitle').textContent = t.subtitle;
      document.getElementById('ayahRef').textContent = t.ayahRef;
      document.getElementById('ctaText').textContent = t.cta;
      document.getElementById('ctaSub').textContent = t.ctaSub;
      document.title = t.title + ' | Radio Ma';
      const grid = document.getElementById('featuresGrid');
      grid.innerHTML = t.features.map(f => {
        const url = featureLinks[f.icon] || BASE;
        return `<a class="feature" href="${url}" target="_blank" rel="noopener">
          <span class="feature-icon">${f.icon}</span>
          <p class="feature-title">${f.title}</p>
          <p class="feature-desc">${f.desc}</p>
          <span class="feature-arrow">↗</span>
        </a>`;
      }).join('');
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === code);
      });
      localStorage.setItem('preferredLang', code);
      updateStatsLabels(code);
    };
    buildSwitcher();
    const saved = localStorage.getItem('preferredLang');
    applyLang(saved && translations[saved] ? saved : detectLang());

    // Toggle open/close
    const wrapper = document.getElementById('langWrapper');
    document.getElementById('langToggle').addEventListener('click', (e) => {
      e.stopPropagation();
      wrapper.classList.toggle('open');
      // focus search when opening
      if (wrapper.classList.contains('open')) {
        setTimeout(() => {
          const s = document.getElementById('langSearch');
          if (s) s.focus();
        }, 50);
      }
    });
    // clicks INSIDE the switcher (search, buttons, dividers) don't close it
    document.getElementById('langSwitcher').addEventListener('click', (e) => e.stopPropagation());
    document.addEventListener('click', () => wrapper.classList.remove('open'));

    // ─────────────────────────────────────────────
    //  STATS — triple-click to reveal
    // ─────────────────────────────────────────────
    let clickCount = 0, clickTimer = null;
    const statsBtn = document.getElementById('statsToggle');
    const flagBox  = document.getElementById('flagContainer');

    statsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      clickCount++;
      clearTimeout(clickTimer);

      // highlight button slightly on each click
      statsBtn.style.color = 'rgba(240,208,128,0.6)';
      statsBtn.style.borderColor = 'rgba(201,168,76,0.4)';

      if (clickCount >= 3) {
        clickCount = 0;
        const isOpen = flagBox.style.display !== 'none';
        flagBox.style.display = isOpen ? 'none' : 'block';
        // full glow when open
        statsBtn.style.color = isOpen ? 'rgba(245,239,224,0.3)' : 'rgba(240,208,128,0.9)';
        statsBtn.style.borderColor = isOpen ? 'rgba(201,168,76,0.15)' : 'rgba(201,168,76,0.7)';
        statsBtn.style.background = isOpen ? 'rgba(13,51,38,0.55)' : 'rgba(201,168,76,0.15)';
      } else {
        // reset dim after 1.2s if not 3 clicks
        clickTimer = setTimeout(() => {
          clickCount = 0;
          if (flagBox.style.display === 'none') {
            statsBtn.style.color = 'rgba(245,239,224,0.3)';
            statsBtn.style.borderColor = 'rgba(201,168,76,0.15)';
            statsBtn.style.background = 'rgba(13,51,38,0.55)';
          }
        }, 1200);
      }
    });

    // close stats panel when clicking outside
    document.addEventListener('click', () => {
      if (flagBox.style.display !== 'none') {
        flagBox.style.display = 'none';
        statsBtn.style.color = 'rgba(245,239,224,0.3)';
        statsBtn.style.borderColor = 'rgba(201,168,76,0.15)';
        statsBtn.style.background = 'rgba(13,51,38,0.55)';
      }
    });
    document.getElementById('statsWrapper').addEventListener('click', e => e.stopPropagation());
  </script>
</body>
</html>
